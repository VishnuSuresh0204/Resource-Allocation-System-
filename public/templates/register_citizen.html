{% extends 'base.html' %}
{% block content %}
<div style="max-width: 700px; margin: 2rem auto;">
    <div class="card">
        <div class="text-center mb-4">
            <div style="width: 64px; height: 64px; background: var(--primary-light); color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 1.5rem;">
                <i class="fas fa-user-plus"></i>
            </div>
            <h2 class="form-title" style="border: none; padding: 0;">Citizen Registration</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Join the network for emergency resource assistance</p>
        </div>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="Create a password">
                </div>
            </div>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" required placeholder="Your full name">
            </div>

            <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required placeholder="email@example.com">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" name="phone" required placeholder="Phone number">
                </div>
            </div>

            <div class="form-group">
                <label>Current District</label>
                <select name="district" required style="appearance: auto; color: var(--text-main) !important;">
                    <option value="">Select your district</option>
                    {% for d in districts %}
                    <option value="{{ d.id }}">{{ d.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Permanent Address</label>
                <textarea name="address" rows="3" required placeholder="Full residential address..."></textarea>
            </div>

            <div class="form-group">
                <label>Profile Picture (Optional)</label>
                <div class="file-upload-wrapper">
                    <i class="fas fa-cloud-arrow-up" id="uploadIcon"></i>
                    <p class="file-upload-text" id="uploadText">Drag & drop or click to upload profile picture</p>
                    <input type="file" name="profile_pic" accept="image/*" onchange="previewImage(event)">
                    <div id="imagePreviewContainer" style="display: none; margin-top: 15px;">
                        <img id="imagePreview" style="max-height: 120px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);" />
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-primary" style="padding: 1rem; font-size: 1.1rem; margin-top: 1rem;">Create Citizen Account</button>

<script>
function previewImage(event) {
    const reader = new FileReader();
    reader.onload = function() {
        const output = document.getElementById('imagePreview');
        output.src = reader.result;
        document.getElementById('imagePreviewContainer').style.display = 'block';
        document.getElementById('uploadIcon').style.display = 'none';
        document.getElementById('uploadText').innerText = 'Change selected picture';
    };
    if (event.target.files[0]) {
        reader.readAsDataURL(event.target.files[0]);
    }
}
</script>
        </form>

        <div class="text-center mt-4" style="margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1.5rem;">
            <p style="font-size: 0.85rem; color: var(--text-muted);">
                Already have an account? <a href="/login/" style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign In here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
