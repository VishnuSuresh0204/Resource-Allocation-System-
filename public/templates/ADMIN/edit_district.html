{% extends 'ADMIN/commen.html' %}

{% block admin_body %}
<div class="page-header">
    <h1>Edit District</h1>
    <a href="/admin_manage_districts/" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
</div>

<div class="card" style="max-width: 600px; margin: 0 auto;">
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>District Name</label>
            <input type="text" name="name" class="form-control" required value="{{ district.name }}" placeholder="District name">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="description" class="form-control" rows="5" placeholder="Description details...">{{ district.description }}</textarea>
        </div>
        <button type="submit" class="btn-submit" style="margin-top: 1rem;">Update District</button>
    </form>
</div>
{% endblock %}
