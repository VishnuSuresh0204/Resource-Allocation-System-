{% extends 'ADMIN/commen.html' %}

{% block admin_body %}
<div class="page-header">
    <h1>Add District</h1>
    <a href="/admin_manage_districts/" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
</div>

<div class="card" style="max-width: 600px; margin: 0 auto;">
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>District Name</label>
            <input type="text" name="name" class="form-control" required placeholder="e.g., Ernakulam, Wayanad">
        </div>
        <div class="form-group">
            <label>State</label>
            <input type="text" name="state" class="form-control" value="Kerala" readonly>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="description" class="form-control" rows="4" placeholder="Regional details or notes..."></textarea>
        </div>
        <button type="submit" class="btn-submit" style="margin-top: 1rem;">
            Create District
        </button>
    </form>
</div>
{% endblock %}
