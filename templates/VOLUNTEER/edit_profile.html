{% extends 'VOLUNTEER/commen.html' %}

{% block volunteer_body %}
<div class="page-header">
    <h1>Edit Profile</h1>
    <a href="/volunteer_profile/" class="btn btn-outline" style="border-color: rgba(255,255,255,0.1);"><i class="fas fa-arrow-left"></i> Back to Profile</a>
</div>

<div class="card" style="max-width: 600px; margin: 0 auto;">
    <form action="/volunteer_edit_profile/" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" class="form-control" value="{{ volunteer.name }}" pattern="[A-Za-z\s]+" title="Only letters and spaces are allowed" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" class="form-control" value="{{ volunteer.email }}" required>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" name="phone" class="form-control" value="{{ volunteer.phone }}" pattern="[6-9][0-9]{9}" title="Please enter a valid 10-digit phone number starting with 6-9" required>
            </div>
        </div>

        <div class="form-group">
            <label>Skills & Expertise (e.g., First Aid, Driving, Swimming)</label>
            <textarea name="skills" class="form-control" rows="3" required>{{ volunteer.skills }}</textarea>
        </div>

        <div class="form-group">
            <label>District</label>
            <select name="district" class="form-control" required>
                {% for d in districts %}
                    <option value="{{ d.id }}" {% if d.id == volunteer.district.id %}selected{% endif %}>{{ d.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Change Profile Picture</label>
            <input type="file" name="profile_pic" class="form-control">
        </div>

        <button type="submit" class="btn-submit">Update Profile</button>
    </form>
</div>
{% endblock %}
