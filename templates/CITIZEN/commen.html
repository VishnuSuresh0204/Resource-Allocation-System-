<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}User Portal - ERA System{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --secondary: #64748b;
            --bg: #f8fafc;
            --sidebar: #0f172a;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; }

        .dashboard-wrapper { display: flex; flex-direction: column; min-height: 100vh; }

        /* Top Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--sidebar);
            padding: 0.75rem 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0.5rem 0.8rem;
            text-decoration: none;
            color: #94a3b8;
            font-weight: 500;
            border-radius: 8px;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .nav-link i { font-size: 0.95rem; width: 16px; text-align: center; }
        .nav-link:hover, .nav-link.active {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }

        .logout-btn {
            color: #f87171 !important;
        }
        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.15) !important;
            color: #f87171 !important;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 2.5rem 5%;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

        .badge { padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
        .badge-danger { background: #fee2e2; color: #dc2626; }
        .badge-info { background: #e0f2fe; color: #0369a1; }

        #notification-container {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            display: flex; flex-direction: column; gap: 10px;
        }
        .toast {
            background: white; border-left: 4px solid var(--primary);
            padding: 1rem; border-radius: 8px; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            min-width: 300px; display: flex; justify-content: space-between; align-items: center;
        }

        @media (max-width: 768px) {
            .navbar { flex-direction: column; gap: 10px; padding: 1rem; }
            .nav-links { flex-wrap: wrap; justify-content: center; }
            .nav-link span { display: none; }
        }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <header class="navbar">
            <a href="/citizen_home/" class="logo">
                <i class="fas fa-house-user"></i>
                <span>USER PORTAL</span>
            </a>

            <div class="nav-links">
                <a href="/citizen_home/" class="nav-link {% if request.path == '/citizen_home/' %}active{% endif %}">
                    <i class="fas fa-gauge-high"></i><span>Overview</span>
                </a>
                <a href="/citizen_request_resource/" class="nav-link"><i class="fas fa-hand-holding-hand"></i><span>Request Resources</span></a>
                <a href="/citizen_view_resource_requests/" class="nav-link"><i class="fas fa-clock-rotate-left"></i><span>Request History</span></a>
            </div>

            <div>
                <a href="/logout/" class="nav-link logout-btn">
                    <i class="fas fa-right-from-bracket"></i><span>Logout</span>
                </a>
            </div>
        </header>

        <main class="main-content">
            {% block citizen_body %}{% endblock %}
        </main>
    </div>

    <div id="notification-container"></div>

    <script>
        function checkNotifications() {
            fetch('/get_notifications/')
                .then(r => r.json())
                .then(data => {
                    data.notifications.forEach(n => {
                        const toast = document.createElement('div');
                        toast.className = 'toast';
                        toast.innerHTML = `<span>${n.message}</span><i class="fas fa-times" onclick="this.parentElement.remove()" style="cursor:pointer;margin-left:10px;color:#94a3b8"></i>`;
                        document.getElementById('notification-container').appendChild(toast);
                        setTimeout(() => toast.remove(), 8000);
                    });
                });
        }
        setInterval(checkNotifications, 15000);
        setTimeout(checkNotifications, 2000);
    </script>
</body>
</html>
