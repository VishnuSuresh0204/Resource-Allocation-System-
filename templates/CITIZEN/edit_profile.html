{% extends 'CITIZEN/commen.html' %}

{% block citizen_body %}
<div class="page-header">
    <h1>Edit Profile</h1>
    <a href="/citizen_profile/" class="btn btn-outline" style="border-color: rgba(255,255,255,0.1);"><i class="fas fa-arrow-left"></i> Back to Profile</a>
</div>

<div class="card" style="max-width: 650px; margin: 0 auto;">
    <form action="/citizen_edit_profile/" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" class="form-control" value="{{ citizen.name }}" pattern="[A-Za-z\s]+" title="Only letters and spaces are allowed" placeholder="Your full name" required>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" value="{{ citizen.email }}" placeholder="email@domain.com" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" name="phone" class="form-control" value="{{ citizen.phone }}" pattern="[6-9][0-9]{9}" title="Please enter a valid 10-digit phone number starting with 6-9" placeholder="e.g., 9876543210" required>
            </div>
        </div>

        <div class="form-group">
            <label>Address</label>
            <textarea name="address" class="form-control" rows="3" placeholder="Enter your full address" required>{{ citizen.address }}</textarea>
        </div>

        <div class="form-group">
            <label>District</label>
            <select name="district" class="form-control" required style="appearance: auto; color: var(--text-main) !important;">
                {% for d in districts %}
                    <option value="{{ d.id }}" {% if d.id == citizen.district.id %}selected{% endif %}>{{ d.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Profile Picture</label>
            <div class="file-upload-wrapper">
                <i class="fas fa-cloud-arrow-up" id="uploadIcon"></i>
                <p class="file-upload-text" id="uploadText">Drag & drop or click to change profile picture</p>
                <input type="file" name="profile_pic" accept="image/*" onchange="previewImage(event)">
                <div id="imagePreviewContainer" style="{% if citizen.profile_pic %}display: block;{% else %}display: none;{% endif %} margin-top: 15px;">
                    <img id="imagePreview" src="{% if citizen.profile_pic %}{{ citizen.profile_pic.url }}{% endif %}" style="max-height: 120px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);" />
                </div>
            </div>
        </div>

        <button type="submit" class="btn-submit" style="margin-top: 1rem;">Update Profile</button>
    </form>
</div>

<script>
function previewImage(event) {
    const reader = new FileReader();
    reader.onload = function() {
        const output = document.getElementById('imagePreview');
        output.src = reader.result;
        document.getElementById('imagePreviewContainer').style.display = 'block';
        document.getElementById('uploadIcon').style.display = 'none';
        document.getElementById('uploadText').innerText = 'Change selected picture';
    };
    if (event.target.files[0]) {
        reader.readAsDataURL(event.target.files[0]);
    }
}
</script>
{% endblock %}
