{% extends 'ADMIN/commen.html' %}

{% block admin_body %}
<div class="page-header">
    <h1>Edit Staff Member</h1>
    <a href="/admin_manage_staff/" class="btn btn-sm" style="background: rgba(255,255,255,0.1); color: white;"><i class="fas fa-arrow-left"></i> Back</a>
</div>

<div style="max-width: 800px; margin: 0 auto;">
    <div class="card">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-row">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" class="form-control" required value="{{ staff.name }}" pattern="[A-Za-z\s]+" title="Only letters and spaces are allowed">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" class="form-control" required value="{{ staff.email }}">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" name="phone" class="form-control" required value="{{ staff.phone }}" pattern="[6-9][0-9]{9}" title="Please enter a valid 10-digit phone number starting with 6-9">
                </div>
                <div class="form-group">
                    <label>Designation</label>
                    <input type="text" name="designation" class="form-control" required value="{{ staff.designation }}">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>District Assigned</label>
                    <select name="district" class="form-control" required>
                        {% for d in districts %}
                        <option value="{{ d.id }}" {% if d.id == staff.district.id %}selected{% endif %}>{{ d.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Change Profile Picture</label>
                    <div class="file-upload-wrapper">
                        <i class="fas fa-cloud-arrow-up" id="uploadIcon"></i>
                        <p class="file-upload-text" id="uploadText">Drag & drop or click to change profile picture</p>
                        <input type="file" name="profile_pic" accept="image/*" onchange="previewImage(event)">
                        <div id="imagePreviewContainer" style="display: none; margin-top: 15px;">
                            <img id="imagePreview" style="max-height: 120px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);" />
                        </div>
                    </div>
                </div>
            </div>
            
            <button type="submit" class="btn-submit">Update Staff Details</button>

<script>
function previewImage(event) {
    const reader = new FileReader();
    reader.onload = function() {
        const output = document.getElementById('imagePreview');
        output.src = reader.result;
        document.getElementById('imagePreviewContainer').style.display = 'block';
        document.getElementById('uploadIcon').style.display = 'none';
        document.getElementById('uploadText').innerText = 'Change selected picture';
    };
    if (event.target.files[0]) {
        reader.readAsDataURL(event.target.files[0]);
    }
}
</script>
        </form>
    </div>
</div>
{% endblock %}
