{% extends 'ADMIN/commen.html' %}

{% block admin_body %}
<div class="page-header">
    <h1>Add District Officer</h1>
    <a href="/admin_manage_staff/" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
</div>

<div class="card" style="max-width: 800px; margin: 0 auto;">
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" required placeholder="Choose a unique username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required placeholder="Create a secure password">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" class="form-control" required placeholder="Officer's full name">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" required placeholder="officer@domain.com">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" name="phone" class="form-control" required placeholder="e.g., +91 9876543210">
            </div>
            <div class="form-group">
                <label>Assign District</label>
                <select name="district" class="form-control" required style="appearance: auto; color: var(--text-main) !important;">
                    <option value="">Select District</option>
                    {% for d in districts %}
                    <option value="{{ d.id }}">{{ d.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Designation</label>
            <input type="text" name="designation" class="form-control" required placeholder="e.g., District Disaster Manager">
        </div>

        <div class="form-group">
            <label>Profile Picture</label>
            <div class="file-upload-wrapper">
                <i class="fas fa-cloud-arrow-up" id="uploadIcon"></i>
                <p class="file-upload-text" id="uploadText">Drag & drop or click to upload profile picture</p>
                <input type="file" name="profile_pic" accept="image/*" onchange="previewImage(event)">
                <div id="imagePreviewContainer" style="display: none; margin-top: 15px;">
                    <img id="imagePreview" style="max-height: 120px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);" />
                </div>
            </div>
        </div>

        <button type="submit" class="btn-submit" style="margin-top: 1rem;">
            Create Officer Account
        </button>

<script>
function previewImage(event) {
    const reader = new FileReader();
    reader.onload = function() {
        const output = document.getElementById('imagePreview');
        output.src = reader.result;
        document.getElementById('imagePreviewContainer').style.display = 'block';
        document.getElementById('uploadIcon').style.display = 'none';
        document.getElementById('uploadText').innerText = 'Change selected picture';
    };
    if (event.target.files[0]) {
        reader.readAsDataURL(event.target.files[0]);
    }
}
</script>
    </form>
</div>
{% endblock %}
