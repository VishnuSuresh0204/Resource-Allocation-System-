<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Dashboard - ERA System{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --secondary: #64748b;
            --bg: #f8fafc;
            --sidebar: #0f172a;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; }

        .dashboard-wrapper { display: flex; flex-direction: column; min-height: 100vh; }

        /* Top Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f172a;
            padding: 0.75rem 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 800;
            color: #ffffff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            color: #3b82f6;
        }

        .nav-links {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0.5rem 0.8rem;
            text-decoration: none;
            color: #94a3b8;
            font-weight: 500;
            border-radius: 8px;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .nav-link i { font-size: 0.95rem; width: 16px; text-align: center; }
        .nav-link:hover, .nav-link.active {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }

        .logout-btn {
            color: #f87171 !important;
        }
        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.15) !important;
            color: #f87171 !important;
        }

        /* Form Styling */
        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        .form-control, input[type="text"], input[type="password"], input[type="email"], input[type="number"], select, textarea {
            width: 100%;
            padding: 0.85rem 1.15rem;
            border: 1.5px solid #cbd5e1;
            border-radius: 10px;
            background: #f8fafc;
            color: var(--text-main);
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-control:focus, input[type="text"]:focus, input[type="password"]:focus, input[type="email"]:focus, input[type="number"]:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
        }

        textarea.form-control, textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Custom File Upload */
        .file-upload-wrapper {
            position: relative;
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            background: #f8fafc;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .file-upload-wrapper:hover {
            border-color: var(--primary);
            background: rgba(37, 99, 235, 0.02);
        }

        .file-upload-wrapper i {
            font-size: 2rem;
            color: var(--secondary);
            margin-bottom: 12px;
            transition: color 0.2s ease;
        }

        .file-upload-wrapper:hover i {
            color: var(--primary);
        }

        .file-upload-wrapper input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-upload-text {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .btn-submit, button.btn-primary {
            background: var(--primary);
            color: white;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn-submit:hover, button.btn-primary:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px -3px rgba(37, 99, 235, 0.3);
        }

        .btn-submit:active, button.btn-primary:active {
            transform: translateY(0);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 2.5rem 5%;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .page-header h1 { font-family: 'Outfit', sans-serif; font-size: 1.75rem; }

        .card {
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 1.5rem;
            box-shadow: var(--shadow);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            background: #ffffff;
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .stat-label { font-size: 0.85rem; color: var(--text-muted); }
        .stat-value { font-size: 1.75rem; font-weight: 800; color: var(--text-main); }

        /* Tables */
        .table-container { background: #ffffff; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 1rem; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); }
        td { padding: 1rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { border: 1px solid var(--border); color: var(--text-main); background: #ffffff; }
        .btn-danger { background: #fee2e2; color: #dc2626; }

        .badge { padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
        .badge-info { background: #e0f2fe; color: #0369a1; }
        .badge-success { background: #dcfce7; color: #15803d; }

        @media (max-width: 768px) {
            .navbar { flex-direction: column; gap: 10px; padding: 1rem; }
            .nav-links { flex-wrap: wrap; justify-content: center; }
            .nav-link span { display: none; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="dashboard-wrapper">
        <header class="navbar">
            <a href="/admin_home/" class="logo">
                <i class="fas fa-boxes-stacked"></i>
                <span>ERA ADMIN</span>
            </a>

            <div class="nav-links">
                <a href="/admin_home/" class="nav-link {% if request.path == '/admin_home/' %}active{% endif %}">
                    <i class="fas fa-chart-pie"></i><span>Dashboard</span>
                </a>
                <a href="/admin_manage_districts/" class="nav-link"><i class="fas fa-map"></i><span>Districts</span></a>
                <a href="/admin_manage_staff/" class="nav-link"><i class="fas fa-user-shield"></i><span>District Officers</span></a>
                <a href="/admin_approve_volunteers/" class="nav-link"><i class="fas fa-user-group"></i><span>Volunteers</span></a>
                <a href="/admin_manage_resource_categories/" class="nav-link"><i class="fas fa-tags"></i><span>Categories</span></a>
                <a href="/admin_view_resource_stock/" class="nav-link"><i class="fas fa-warehouse"></i><span>Stock Monitoring</span></a>
            </div>

            <div>
                <a href="/logout/" class="nav-link logout-btn">
                    <i class="fas fa-sign-out-alt"></i><span>Logout</span>
                </a>
            </div>
        </header>

        <main class="main-content">
            {% if messages %}
                <div style="margin-bottom: 2rem;">
                    {% for message in messages %}
                        <div class="badge badge-{% if message.tags == 'error' %}danger{% else %}success{% endif %}" style="padding: 1rem; border-radius: 8px; display: block; margin-bottom: 1rem;">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            {% block admin_body %}{% endblock %}
        </main>
    </div>
</body>
</html>
