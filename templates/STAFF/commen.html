<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Officer Dashboard - ERA System{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-light: rgba(59, 130, 246, 0.15);
            --secondary: #94a3b8;
            --bg: #090d16;
            --sidebar: #111827;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: #1f2937;
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; }

        .dashboard-wrapper { display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 3rem;
        }

        .nav-group { margin-bottom: 2rem; }
        .nav-group-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 1rem;
            padding-left: 0.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.75rem 1rem;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 500;
            border-radius: 10px;
            margin-bottom: 0.25rem;
            font-size: 0.9rem;
        }

        .nav-link i { font-size: 1.1rem; width: 20px; text-align: center; }
        .nav-link:hover, .nav-link.active {
            background: var(--primary-light);
            color: var(--primary);
        }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            flex: 1;
            padding: 2.5rem 3rem;
        }

        .card {
            background: var(--sidebar);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--sidebar);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            border-left: 4px solid var(--primary);
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

        .badge { padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
        .badge-danger { background: #fee2e2; color: #dc2626; }
        .badge-warning { background: #fef3c7; color: #d97706; }
        .badge-success { background: #dcfce7; color: #15803d; }

        #notification-container {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            display: flex; flex-direction: column; gap: 10px;
        }
        .toast {
            background: white; border-left: 4px solid var(--primary);
            padding: 1rem; border-radius: 8px; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            min-width: 300px; display: flex; justify-content: space-between; align-items: center;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <a href="/staff_home/" class="logo">
                <i class="fas fa-building-shield"></i>
                <span>OFFICER</span>
            </a>

            <div class="nav-group">
                <div class="nav-group-title">Main</div>
                <a href="/staff_home/" class="nav-link {% if request.path == '/staff_home/' %}active{% endif %}">
                    <i class="fas fa-house"></i><span>Dashboard</span>
                </a>
            </div>

            <div class="nav-group">
                <div class="nav-group-title">Resources & Inventory</div>
                <a href="/staff_manage_stock/" class="nav-link"><i class="fas fa-warehouse"></i><span>Manage Stock</span></a>
                <a href="/staff_view_resource_requests/" class="nav-link"><i class="fas fa-hand-holding-medical"></i><span>Resource Requests</span></a>
            </div>

            <div style="margin-top: auto; padding-top: 2rem;">
                <a href="/logout/" class="nav-link" style="color: #ef4444;">
                    <i class="fas fa-power-off"></i><span>Logout</span>
                </a>
            </div>
        </aside>

        <main class="main-content">
            {% block staff_body %}{% endblock %}
        </main>
    </div>

    <div id="notification-container"></div>

    <script>
        function checkNotifications() {
            fetch('/get_notifications/')
                .then(r => r.json())
                .then(data => {
                    data.notifications.forEach(n => {
                        const toast = document.createElement('div');
                        toast.className = 'toast';
                        toast.innerHTML = `<span>${n.message}</span><i class="fas fa-times" onclick="this.parentElement.remove()" style="cursor:pointer;margin-left:10px;color:#94a3b8"></i>`;
                        document.getElementById('notification-container').appendChild(toast);
                        setTimeout(() => toast.remove(), 8000);
                    });
                });
        }
        setInterval(checkNotifications, 15000);
        setTimeout(checkNotifications, 2000);
    </script>
</body>
</html>
