{% extends 'base.html' %}
{% block content %}
<div style="max-width: 450px; margin: 4rem auto;">
    <div class="card">
        <div class="text-center mb-4">
            <div style="width: 64px; height: 64px; background: var(--primary-light); color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 1.5rem;">
                <i class="fas fa-lock"></i>
            </div>
            <h2 class="form-title" style="border: none; padding: 0;">Sign In</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Access your district officer or user portal</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn-primary">Sign In to Dashboard</button>
        </form>

        <div class="text-center mt-4" style="margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1.5rem;">
            <p style="font-size: 0.85rem; color: var(--text-muted);">
                Don't have an account? <br>
                <a href="/register_citizen/" style="color: var(--primary); font-weight: 600; text-decoration: none;">Register as Citizen</a> or 
                <a href="/register_volunteer/" style="color: var(--primary); font-weight: 600; text-decoration: none;">Volunteer</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
